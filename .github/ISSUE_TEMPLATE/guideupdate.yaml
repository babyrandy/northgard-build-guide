name: Update Ticket
description: Submit an Update Request
title: "[Guide Update]: "
labels: ["update-request"]
body:
  - type: input
    id: contact
    attributes:
      label: Contact (Discord or email)
      placeholder: yourname#1234
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What needs updated?
      placeholder: Describe your issue...
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional details
      placeholder: Anything else we should know?
